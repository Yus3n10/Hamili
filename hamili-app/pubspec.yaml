name: hamili
description: Hamili — AI-powered personal finance tracker with Hami, your friendly financial companion.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.5.0

  # Local storage / offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.68.0

  # Navigation
  go_router: ^14.2.0

  # UI helpers
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Motion — lightweight, pure-Dart animation (staggers, fades, shimmers)
  flutter_animate: ^4.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/hami/
  #   - assets/icons/
