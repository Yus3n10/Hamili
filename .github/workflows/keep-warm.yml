name: Keep backend warm

on:
  schedule:
    - cron: "*/5 22-23,0-15 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          code=$(curl -s -m 90 -o /dev/null -w "%{http_code}" https://hamili-api-lu9g.onrender.com/health || echo "000")
          echo "health check returned HTTP $code"
